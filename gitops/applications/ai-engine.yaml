apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-engine
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/valkyrie-platform.git # Update with your repo URL
    targetRevision: main
    path: gitops/manifests/ai
  destination:
    server: https://kubernetes.default.svc
    namespace: ai
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
