apiVersion: apps/v1
kind: Deployment
metadata:
  name: incident-engine
  namespace: ai
  labels:
    app: incident-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incident-engine
  template:
    metadata:
      labels:
        app: incident-engine
    spec:
      containers:
      - name: incident-engine
        # Replace this with your actual built image (e.g., ghcr.io/your-org/incident-engine:latest)
        # Using a public python placeholder for demo purposes if the image isn't built yet
        image: python:3.11-slim
        command: ["/bin/sh", "-c"]
        args: 
          - |
            echo "Waiting for actual incident-engine image to be deployed..."
            sleep infinity
        ports:
        - containerPort: 8000
        env:
        - name: OLLAMA_URL
          value: "http://ollama:11434"
        - name: MODEL_NAME
          value: "phi3"
---
apiVersion: v1
kind: Service
metadata:
  name: incident-engine
  namespace: ai
spec:
  selector:
    app: incident-engine
  ports:
  - port: 8000
    targetPort: 8000
